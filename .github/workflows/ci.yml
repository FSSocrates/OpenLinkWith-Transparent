name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    paths-ignore:
      - '*.md'
  workflow_dispatch:     # ← Add this so you can trigger it manually from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # ← Important: Ensures git rev-parse works (for GIT_SHA)

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run checks and Build Transparent (Floss) APK
        run: ./gradlew evaluateViolations testDebugUnitTest testFlossDebugUnitTest assembleFlossDebug --stacktrace

      - name: Upload Transparent APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenLinkWith-Transparent-APK
          path: app/build/outputs/apk/floss/debug/app-floss-debug.apk
          if-no-files-found: error     # ← Fail clearly if APK is missing