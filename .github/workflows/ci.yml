name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    paths-ignore:
      - '*.md'
  workflow_dispatch:      # Allows manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # Required for git rev-parse (GIT_SHA)

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'          # Changed to 11 — compatible with Gradle 6.8.2
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run checks and Build Transparent (Floss) APK
        run: ./gradlew evaluateViolations testDebugUnitTest testFlossDebugUnitTest assembleFlossDebug --stacktrace

      - name: Upload Transparent APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenLinkWith-Transparent-APK
          path: app/build/outputs/apk/floss/debug/app-floss-debug.apk
          if-no-files-found: error